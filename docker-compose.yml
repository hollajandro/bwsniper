# ─────────────────────────────────────────────────────────────────────────────
# BuyWander Sniper — Docker Compose
#
# Quick start:
#   cp .env.example .env        # fill in your values
#   docker compose up -d
#
# The web UI will be available at http://localhost:80
# API will be available at http://localhost:8000 (optional direct access)
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: bwsniper-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bwsniper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bwsniper123}
      POSTGRES_DB: bwsniper
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - bwsniper-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bwsniper -d bwsniper"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis Cache & Job Queue ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bwsniper-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - bwsniper-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-bwsniper}-backend:${TAG:-latest}
    container_name: bwsniper-api
    restart: unless-stopped
    user: "0"

    environment:
      # Database — PostgreSQL connection string
      DATABASE_URL: "postgresql://bwsniper:${POSTGRES_PASSWORD:-bwsniper123}@db:5432/bwsniper"

      # Redis connection for caching and job queue
      REDIS_URL: "redis://redis:6379/0"

      # JWT signing secret — MUST be set in production.
      # Generate one with: python -c "import secrets; print(secrets.token_urlsafe(48))"
      SECRET_KEY: "${SECRET_KEY}"

      # Fernet key used to encrypt stored BuyWander passwords.
      # Auto-generated on first run if not set (written to /data/fernet.key).
      # Set this explicitly so it survives container recreations.
      FERNET_KEY: "${FERNET_KEY:-}"

      # Allowed CORS origins — comma-separated.
      # Must include the URL your browser uses to reach the frontend.
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost}"

      # Optional: Serper.dev API key for Google Shopping price comparison.
      # Free tier: 2,500 searches/month — https://serper.dev
      SERPER_API_KEY: "${SERPER_API_KEY:-}"

      # Number of Uvicorn worker processes (default 2).
      WEB_CONCURRENCY: "${WEB_CONCURRENCY:-2}"

      # OpenTelemetry exporter endpoint (optional)
      OTEL_EXPORTER_ENDPOINT: "${OTEL_EXPORTER_ENDPOINT:-}"

      # Log level
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"

      # JWT token lifetimes (optional overrides).
      # ACCESS_TOKEN_EXPIRE_MINUTES: "1440"   # 24 hours
      # REFRESH_TOKEN_EXPIRE_DAYS:  "30"

    volumes:
      # Persist Fernet key and other data files.
      - backend-data:/backend/data

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    command: >
      sh -c "chmod -R 775 /backend/data || true &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers $${WEB_CONCURRENCY:-2} --proxy-headers --forwarded-allow-ips=*"

    # Expose API port for direct access (optional)
    ports:
      - "8000:8000"

    networks:
      - bwsniper-network

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Nginx + React Frontend ──────────────────────────────────────────────────
  frontend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-bwsniper}-frontend:${TAG:-latest}
    container_name: bwsniper-web
    restart: unless-stopped

    ports:
      - "${WEB_PORT:-80}:80"

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - bwsniper-network

# ─────────────────────────────────────────────────────────────────────────────
networks:
  bwsniper-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  backend-data:
    driver: local
  # Volume for mounting old SQLite DB during migration
  sqlite-migration:
    driver: local

# ── Migration Service (one-time use) ──────────────────────────────────────────
# Run with: docker compose run --rm db-migration
# Mount your old SQLite DB to /app/backend/data/app.db before running
  db-migration:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME:-bwsniper}-backend:${TAG:-latest}
    container_name: bwsniper-migration
    user: "0"
    environment:
      DATABASE_URL: "postgresql://bwsniper:${POSTGRES_PASSWORD:-bwsniper123}@db:5432/bwsniper"
    volumes:
      - backend-data:/app/backend/data
      - sqlite-migration:/mnt/sqlite
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "cp /mnt/sqlite/app.db /app/backend/data/app.db 2>/dev/null || true &&
             cp /mnt/sqlite/fernet.key /app/backend/data/fernet.key 2>/dev/null || true &&
             python /app/backend/scripts/migrate_from_sqlite.py"
    networks:
      - bwsniper-network
