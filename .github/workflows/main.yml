name: Cleanup Old Images
on:
  schedule:
    - cron: '0 0 * * SUN'
  workflow_dispatch:

jobs:
  delete-images:
    runs-on: ubuntu-latest
    steps:
      - name: Delete dev and SHA images
        uses: bots-house/ghcr-delete-image-action@v1.1.0
        with:
          owner: ${{ github.repository_owner }}
          name: bwsniper-frontend
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "dev-"
      - name: Delete SHA images
        uses: bots-house/ghcr-delete-image-action@v1.1.0
        with:
          owner: ${{ github.repository_owner }}
          name: bwsniper-frontend
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "sha-"
  delete-images2:
    runs-on: ubuntu-latest
    steps:
      - name: Delete dev and SHA images
        uses: bots-house/ghcr-delete-image-action@v1.1.0
        with:
          owner: ${{ github.repository_owner }}
          name: bwsniper-frontend
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "dev-"
      - name: Delete SHA images
        uses: bots-house/ghcr-delete-image-action@v1.1.0
        with:
          owner: ${{ github.repository_owner }}
          name: bwsniper-backend
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "sha-"
