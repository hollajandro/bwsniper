# ─────────────────────────────────────────────────────────────────────────────
# BuyWander Sniper — Docker Compose
#
# Quick start:
#   cp .env.example .env        # fill in your values
#   docker compose up -d
#
# The web UI will be available at http://localhost:80
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bwsniper-api
    restart: unless-stopped
    user: "0"

    environment:
      # Database — SQLite stored in the named volume below.
      # The default path matches DATA_DIR in config.py (/backend/data).
      # To use Postgres instead: postgresql+psycopg2://user:pass@db:5432/bwsniper
      # DATABASE_URL: "sqlite:////backend/data/bwsniper.db"

      # JWT signing secret — MUST be set in production.
      # Generate one with: python -c "import secrets; print(secrets.token_urlsafe(48))"
      SECRET_KEY: "${SECRET_KEY}"

      # Fernet key used to encrypt stored BuyWander passwords.
      # Auto-generated on first run if not set (written to /data/fernet.key).
      # Set this explicitly so it survives container recreations.
      FERNET_KEY: "${FERNET_KEY:-}"

      # Allowed CORS origins — comma-separated.
      # Must include the URL your browser uses to reach the frontend.
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost}"

      # Optional: Serper.dev API key for Google Shopping price comparison.
      # Free tier: 2,500 searches/month — https://serper.dev
      SERPER_API_KEY: "${SERPER_API_KEY:-}"

      # Number of Uvicorn worker processes (default 2).
      WEB_CONCURRENCY: "${WEB_CONCURRENCY:-2}"

      # JWT token lifetimes (optional overrides).
      # ACCESS_TOKEN_EXPIRE_MINUTES: "1440"   # 24 hours
      # REFRESH_TOKEN_EXPIRE_DAYS:  "30"

    volumes:
      # Persist the SQLite database and auto-generated key files.
      # Mounted at /backend/data to match DATA_DIR in config.py.
      - backend-data:/backend/data

    command: >
      sh -c "chmod -R 775 /backend/data || true &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers $${WEB_CONCURRENCY:-2} --proxy-headers --forwarded-allow-ips=*"

    # Only expose the API port if you need direct access (e.g. debugging).
    # In normal use the frontend nginx container proxies all /api and /ws traffic.
    # ports:
    #   - "8000:8000"

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Nginx + React frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bwsniper-web
    restart: unless-stopped

    ports:
      - "${WEB_PORT:-80}:80"

    depends_on:
      backend:
        condition: service_healthy

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  backend-data:
    driver: local
